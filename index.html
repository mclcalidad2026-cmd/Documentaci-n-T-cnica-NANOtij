<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Portal Documentación Cartuchos MCL 2026</title>
    <style>
        :root { 
            --mcl-blue: #004b8d; 
            --mcl-green: #a6ce39; 
            --bg-light: #f4f7f9;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* ENCABEZADO */
        header { 
            background: white; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 4px solid var(--mcl-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 80px;
            box-sizing: border-box;
        }
        
        .logo-mcl img { height: 45px; width: auto; } 

        .slogan { text-align: right; }
        .slogan-year { font-size: 20px; font-weight: 900; color: var(--mcl-blue); line-height: 1; }
        .slogan-text { font-weight: bold; color: var(--mcl-blue); font-size: 11px; }

        /* NAVEGACIÓN PRINCIPAL */
        nav { 
            background: var(--mcl-blue); 
            display: flex; 
            position: sticky;
            top: 80px;
            z-index: 999;
        }
        
        nav button { 
            flex: 1;
            background: none; border: none; color: white; padding: 15px 5px; 
            cursor: pointer; font-weight: bold; font-size: 11px; 
            border-bottom: 4px solid transparent;
            text-transform: uppercase;
        }
        
        nav button.active { 
            background: rgba(255,255,255,0.1); 
            border-bottom: 4px solid var(--mcl-green); 
            color: var(--mcl-green); 
        }

        /* CONTENEDORES */
        .container { padding: 15px; box-sizing: border-box; max-width: 900px; margin: auto; }
        .section { display: none; width: 100%; }
        .section.active { display: block; }

        /* BOTONES DE SELECCIÓN DE FICHA */
        .selector-fichas {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-ficha {
            flex: 1;
            padding: 15px 10px;
            border: 2px solid var(--mcl-blue);
            background: white;
            color: var(--mcl-blue);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-ficha span { font-size: 10px; opacity: 0.8; font-weight: normal; }

        .btn-ficha.active {
            background: var(--mcl-blue);
            color: white;
        }

        /* VISORES PDF */
        .pdf-wrapper {
            width: 100%;
            height: 65vh; 
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-fullscreen {
            display: block;
            background: var(--mcl-green);
            color: var(--mcl-blue);
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        @media (min-width: 768px) {
            .logo-mcl img { height: 65px; }
            .pdf-wrapper { height: 800px; }
            .btn-fullscreen { display: none; } 
            nav button { font-size: 13px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-mcl">
        <img src="MC LOGO.png" alt="Logo MCL"> 
    </div>
    <div class="slogan">
        <div class="slogan-year">2026</div>
        <div class="slogan-text">Integra • Optimiza • Crece</div>
    </div>
</header>

<nav>
    <button onclick="tab('p', this)" class="active">1. POLÍTICA DE CAMBIOS Y DEVOLUCIONES</button>
    <button onclick="tab('f', this)">2. FICHA TÉCNICA / HOJA DE SEGURIDAD</button>
</nav>

<div class="container">
    
    <!-- PESTAÑA 1: POLÍTICA -->
    <div id="p" class="section active">
        <h3 style="color: var(--mcl-blue); margin-top:0;">Política de Cambios y Devoluciones</h3>
        <a href="Politica de Cambios y Devoluciones_clientes.pdf" target="_blank" class="btn-fullscreen">Ver Pantalla Completa ↗</a>
        <div class="pdf-wrapper">
            <iframe src="Politica de Cambios y Devoluciones_clientes.pdf"></iframe>
        </div>
    </div>

    <!-- PESTAÑA 2: DOCUMENTACIÓN TÉCNICA -->
    <div id="f" class="section">
        <h3 style="color: var(--mcl-blue); margin-top:0;">Documentación Técnica NANOtij</h3>
        
        <!-- Botones de selección -->
        <div class="selector-fichas">
            <button class="btn-ficha active" onclick="verPdf('NANOtij.pdf', this)">
                FICHA TÉCNICA
                <span>(Porous TDS)</span>
            </button>
            <button class="btn-ficha" onclick="verPdf('NANOtij-Black-Ink-SDS-V.02-17102024.pdf', this)">
                HOJA DE SEGURIDAD
                <span>(Black Ink SDS)</span>
            </button>
        </div>

        <a id="btnFullFicha" href="NANOtij.pdf" target="_blank" class="btn-fullscreen">Ver Pantalla Completa ↗</a>
        
        <div class="pdf-wrapper">
            <iframe id="visorFichas" src="NANOtij.pdf"></iframe>
        </div>
    </div>

</div>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        window.scrollTo(0,0);
    }

    function verPdf(archivo, btn) {
        document.getElementById('visorFichas').src = archivo;
        document.getElementById('btnFullFicha').href = archivo;
        document.querySelectorAll('.btn-ficha').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
